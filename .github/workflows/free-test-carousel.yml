name: Generate Free Test Carousel

# Regeneration trigger: 2026-05-19 11:05 preference integrated card redesign
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/free-test-carousel.yml"
      - "scripts/generate_free_test_carousel_assets.mjs"
      - "web/assets/free-tests/**"
  workflow_dispatch:
    inputs:
      test_id:
        description: "Free test id"
        required: false
        default: "preference-vs-understanding-like"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install image composer
        run: npm install sharp@0.33.5

      - name: Generate free test carousel images
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_BASE_URL: ${{ vars.ARK_BASE_URL || 'https://ark.cn-beijing.volces.com/api/v3' }}
          DOUBAO_IMAGE_MODEL: ${{ vars.DOUBAO_IMAGE_MODEL || 'doubao-seedream-4-0-250828' }}
          ARK_IMAGE_SIZE: "1680x2240"
        run: node scripts/generate_free_test_carousel_assets.mjs "${{ github.event.inputs.test_id }}"

      - name: Commit generated carousel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/assets/free-tests
          if git diff --cached --quiet; then
            echo "No carousel image changes to commit."
          else
            git commit -m "chore: generate free test carousel images"
            git push
          fi
