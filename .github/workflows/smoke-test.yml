name: Secrets Smoke Test

on:
  push:
    paths:
      - ".github/workflows/smoke-test.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Notion and OpenAI secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TEST_DATABASE_ID: ${{ secrets.NOTION_TEST_DATABASE_ID }}
          NOTION_ANGLE_DATABASE_ID: ${{ secrets.NOTION_ANGLE_DATABASE_ID }}
          NOTION_CONTENT_DATABASE_ID: ${{ secrets.NOTION_CONTENT_DATABASE_ID }}
        run: |
          node - <<'NODE'
          const required = [
            "OPENAI_API_KEY",
            "NOTION_TOKEN",
            "NOTION_TEST_DATABASE_ID",
            "NOTION_ANGLE_DATABASE_ID",
            "NOTION_CONTENT_DATABASE_ID",
          ];
          for (const name of required) {
            if (!process.env[name]) throw new Error(`Missing secret: ${name}`);
          }

          async function request(url, options) {
            const res = await fetch(url, options);
            const text = await res.text();
            if (!res.ok) throw new Error(`${url} failed ${res.status}: ${text}`);
            return text ? JSON.parse(text) : {};
          }

          const notionHeaders = {
            Authorization: `Bearer ${process.env.NOTION_TOKEN}`,
            "Content-Type": "application/json",
            "Notion-Version": "2022-06-28",
          };

          for (const id of [
            process.env.NOTION_TEST_DATABASE_ID,
            process.env.NOTION_ANGLE_DATABASE_ID,
            process.env.NOTION_CONTENT_DATABASE_ID,
          ]) {
            await request(`https://api.notion.com/v1/databases/${id}/query`, {
              method: "POST",
              headers: notionHeaders,
              body: JSON.stringify({ page_size: 1 }),
            });
          }

          await request("https://api.openai.com/v1/responses", {
            method: "POST",
            headers: {
              Authorization: `Bearer ${process.env.OPENAI_API_KEY}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              model: "gpt-5-mini",
              input: "Return exactly this JSON: {\"ok\":true}",
            }),
          });

          console.log("Smoke test passed: secrets, Notion, and OpenAI are reachable.");
          NODE
