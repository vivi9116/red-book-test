<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>原生家庭关系模式测试</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="family-theme">
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">付费深度版</p>
          <h1>原生家庭关系模式测试</h1>
        </div>
        <div class="mini-badge">24 题</div>
      </header>

      <section class="preview-board" aria-label="报告预览">
        <div class="paper-visual memory-board">
          <span class="pin"></span>
          <p class="board-kicker">测完你会看到</p>
          <div class="paper-title">你的成长关系脚本</div>
          <div class="paper-line w1"></div>
          <div class="paper-line w2"></div>
          <div class="paper-line w3"></div>
          <div class="mini-bars">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="module-list">
          <div>
            <strong>关系脚本</strong>
            <span>6 种原生家庭影响模式</span>
          </div>
          <div>
            <strong>触发场景</strong>
            <span>你在关系里自动紧张的时刻</span>
          </div>
          <div>
            <strong>来源解释</strong>
            <span>早期经验如何变成现在的反应</span>
          </div>
          <div>
            <strong>改变路径</strong>
            <span>从识别旧脚本开始</span>
          </div>
        </div>
      </section>

      <main class="layout">
        <section class="test-panel" aria-live="polite">
          <div id="app"></div>
        </section>
      </main>
    </div>

    <script src="./config.js"></script>
    <script src="./family-origin-pattern.js" defer></script>
  </body>
</html>
