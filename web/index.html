<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>讨好型人格深度测试</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">付费深度版</p>
          <h1>讨好型人格深度测试</h1>
        </div>
        <div class="mini-badge">36 题</div>
        <span class="deco-heart" aria-hidden="true">♡</span>
      </header>

      <main class="layout">
        <section class="test-panel" aria-live="polite">
          <div id="app"></div>
        </section>
      </main>

      <section class="preview-board" aria-label="报告预览">
        <span class="tape tape-mint" aria-hidden="true"></span>
        <div class="paper-visual">
          <span class="pin"></span>
          <p class="board-kicker">测完你会看到</p>
          <div class="paper-title">你最容易讨好的关系</div>
          <div class="paper-line w1"></div>
          <div class="paper-line w2"></div>
          <div class="paper-line w3"></div>
          <div class="mini-bars" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <span class="sticker-note">not a label</span>
        </div>
        <div class="module-list">
          <div>
            <strong>你不敢拒绝的原因</strong>
            <span>看见愧疚感背后的关系恐惧</span>
          </div>
          <div>
            <strong>你在关系里牺牲了什么</strong>
            <span>时间、情绪、自我价值和边界</span>
          </div>
          <div>
            <strong>你的讨好来源</strong>
            <span>成长经验如何变成关系习惯</span>
          </div>
          <div>
            <strong>你的边界练习起点</strong>
            <span>从识别自己的不愿意开始</span>
          </div>
        </div>
      </section>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
