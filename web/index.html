<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>讨好型人格深度测试</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">付费深度版</p>
          <h1>讨好型人格深度测试</h1>
        </div>
        <div class="mini-badge">36 题</div>
      </header>

      <main class="layout">
        <section class="test-panel" aria-live="polite">
          <div id="app"></div>
        </section>

        <aside class="side-panel" aria-label="报告模块">
          <div class="paper-visual">
            <span class="pin"></span>
            <div class="paper-title">你的关系地图</div>
            <div class="paper-line w1"></div>
            <div class="paper-line w2"></div>
            <div class="paper-line w3"></div>
            <div class="mini-bars">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <div class="module-list">
            <div>
              <strong>分型结果</strong>
              <span>6 种讨好模式</span>
            </div>
            <div>
              <strong>维度占比</strong>
              <span>牺牲、敏感、自责、边界</span>
            </div>
            <div>
              <strong>来源解释</strong>
              <span>成长经验与关系脚本</span>
            </div>
            <div>
              <strong>改变路径</strong>
              <span>从识别不愿意开始</span>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
